name: Run Pytest

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: uv run pytest
